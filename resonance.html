<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共振分析</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="assets/common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="assets/common.js"></script>
    <style>
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { perspective: 600px; cursor: pointer; animation: cardFadeIn 0.4s ease both; }
        .stat-card-inner { display: grid; grid-template: 1fr / 1fr; transition: transform 0.5s; transform-style: preserve-3d; border-radius: 12px; }
        .stat-card.flipped .stat-card-inner { transform: rotateY(180deg); }
        .stat-front, .stat-back { backface-visibility: hidden; grid-area: 1 / 1; padding: 20px; border-radius: 12px; background: var(--white); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .stat-front { z-index: 2; }
        .stat-back { transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }
        .stat-back canvas { width: 100%; height: 120px; display: block; border-radius: 6px; }
        .stat-label { color: var(--gray); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
        .stat-change { font-size: 13px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        .update-btn.btn-csv { background: var(--success); }
        .update-btn.btn-html { background: var(--primary); }
    </style>
</head>
<body data-page="resonance">
    <div class="sidebar" id="appSidebar"></div>
    <div class="main">
        <div class="header">
            <h1>共振分析</h1>
            <div class="header-right">
                <button class="update-btn btn-csv" id="uploadCsvBtn" onclick="uploadCsv()">上传CSV</button>
                <button class="update-btn btn-html" id="uploadHtmlBtn" onclick="uploadHtml()">上传HTML</button>
                <span class="date" id="updateDate">加载中...</span>
            </div>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-bar-inner"></div></div>
        <div class="stat-grid">
            <div class="stat-card" onclick="flipCard(this)">
                <div class="stat-card-inner">
                    <div class="stat-front">
                        <div class="stat-label">上证指数</div>
                        <div class="stat-value" id="marketPrice">-</div>
                        <div class="stat-change" id="marketChange">-</div>
                    </div>
                    <div class="stat-back">
                        <canvas id="miniEtf" height="120"></canvas>
                    </div>
                </div>
            </div>
            <div class="stat-card" onclick="flipCard(this)">
                <div class="stat-card-inner">
                    <div class="stat-front">
                        <div class="stat-label">游戏ETF</div>
                        <div class="stat-value" id="sectorPrice">-</div>
                        <div class="stat-change" id="sectorChange">-</div>
                    </div>
                    <div class="stat-back">
                        <canvas id="miniGame" height="120"></canvas>
                    </div>
                </div>
            </div>
            <div class="stat-card" onclick="flipCard(this)">
                <div class="stat-card-inner">
                    <div class="stat-front">
                        <div class="stat-label">巨人网络</div>
                        <div class="stat-value" id="stockPrice">-</div>
                        <div class="stat-change" id="stockChange">-</div>
                    </div>
                    <div class="stat-back">
                        <canvas id="miniStock" height="120"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title">上证指数价格走势</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="assetChart"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">游戏ETF价格走势</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="gameChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">巨人网络股价走势</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="equityChart"></canvas></div>
        </div>
    </div>

    <script>
        async function uploadCsv() {
            if (IS_REMOTE) { showToast('该功能仅限电脑本地使用', 'warning'); return; }
            const btn = document.getElementById('uploadCsvBtn');
            btn.disabled = true;
            btn.textContent = '上传中...';
            try {
                const res = await fetch('/api/upload/csv', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'ok') {
                    btn.textContent = '上传完成';
                    showToast('CSV上传完成', 'success');
                    setTimeout(() => { btn.disabled = false; btn.textContent = '上传CSV'; }, 1500);
                } else {
                    showToast('上传失败: ' + data.message, 'error', function() { uploadCsv(); });
                    btn.disabled = false;
                    btn.textContent = '上传CSV';
                }
            } catch (e) {
                btn.textContent = '请求失败';
                showToast('请求失败: ' + e.message, 'error', function() { uploadCsv(); });
                btn.disabled = false;
                btn.textContent = '上传CSV';
            }
        }

        async function uploadHtml() {
            if (IS_REMOTE) { showToast('该功能仅限电脑本地使用', 'warning'); return; }
            const btn = document.getElementById('uploadHtmlBtn');
            btn.disabled = true;
            btn.textContent = '上传中...';
            try {
                const res = await fetch('/api/upload/html', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'ok') {
                    btn.textContent = '上传完成';
                    showToast('HTML上传完成', 'success');
                    setTimeout(() => { btn.disabled = false; btn.textContent = '上传HTML'; }, 1500);
                } else {
                    showToast('上传失败: ' + data.message, 'error', function() { uploadHtml(); });
                    btn.disabled = false;
                    btn.textContent = '上传HTML';
                }
            } catch (e) {
                btn.textContent = '请求失败';
                showToast('请求失败: ' + e.message, 'error', function() { uploadHtml(); });
                btn.disabled = false;
                btn.textContent = '上传HTML';
            }
        }

        function flipCard(el) {
            el.classList.toggle('flipped');
        }

        function drawMiniCandles(id, candles, support, resistance) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.clientWidth || canvas.width;
            const ch = canvas.clientHeight || canvas.height;
            canvas.width = w * dpr;
            canvas.height = ch * dpr;
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, w, ch);
            ctx.lineWidth = 2;

            const pad = 20;
            const drawW = w - pad * 2;
            let dataMin = Infinity, dataMax = -Infinity;
            for (const c of candles) {
                if (c.l < dataMin) dataMin = c.l;
                if (c.h > dataMax) dataMax = c.h;
            }
            if (support < dataMin) dataMin = support;
            if (resistance > dataMax) dataMax = resistance;
            const range = Math.max(dataMax - dataMin, 0.001);
            const padAmount = range * 0.15;
            const minV = dataMin - padAmount;
            const maxV = dataMax + padAmount;
            const drawH = ch - pad * 2;
            const yScale = drawH / (maxV - minV);
            const toY = v => pad + (maxV - v) * yScale;

            ctx.strokeStyle = '#10b981';
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(0, toY(support)); ctx.lineTo(w, toY(support)); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#10b981';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(support.toFixed(1), 4, toY(support) - 4);

            ctx.strokeStyle = '#ef4444';
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(0, toY(resistance)); ctx.lineTo(w, toY(resistance)); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#ef4444';
            ctx.fillText(resistance.toFixed(1), 4, toY(resistance) - 4);

            const n = candles.length;
            const barWidth = Math.min(60, drawW / n * 0.2);
            for (let i = 0; i < n; i++) {
                const {o, h, l, c} = candles[i];
                const cx = pad + drawW * (i * 2 + 1) / (n * 2);
                const isUp = c >= o;
                const color = isUp ? '#ef4444' : '#10b981';
                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.moveTo(cx, toY(h)); ctx.lineTo(cx, toY(l)); ctx.stroke();
                const bt = toY(Math.max(o, c));
                const bb = toY(Math.min(o, c));
                ctx.fillRect(cx - barWidth / 2, bt, barWidth, Math.max(bb - bt, 1));
                ctx.fillText(c.toFixed(1), cx + barWidth / 2 + 6, toY(c) + 5);
            }
        }

        async function fetchData(base) {
            const [etfHistory, etfPs, szVwap, gameData, gamePs, stockData, stockPs] = await Promise.all([
                fetchCSV(`${base}/stock_data/历史价格_上证指数.csv`),
                fetchCSV(`${base}/stock_data/压力支撑_上证指数.csv`),
                fetchCSV(`${base}/stock_data/移动加权强弱线_上证指数.csv`),
                fetchCSV(`${base}/stock_data/历史价格_游戏ETF.csv`),
                fetchCSV(`${base}/stock_data/压力支撑_游戏ETF.csv`),
                fetchCSV(`${base}/stock_data/历史价格_巨人网络.csv`),
                fetchCSV(`${base}/stock_data/压力支撑_巨人网络.csv`)
            ]);
            return { etfHistory, etfPs, szVwap, gameData, gamePs, stockData, stockPs };
        }

        function renderUI(data) {
            const { etfHistory, etfPs, szVwap, gameData, gamePs, stockData, stockPs } = data;

            allCharts.forEach(c => c.destroy());
            allCharts.length = 0;
            syncIndex = -1;
            isLocked = false;

            const recent30 = d => d.slice(-30);
            const etfRecent = recent30(etfHistory);
            const gameRecent = recent30(gameData);
            const stockRecent = recent30(stockData);

            const latestEtf = etfRecent[etfRecent.length - 1];
            const prevEtf = etfRecent[etfRecent.length - 2];
            const latestGame = gameRecent[gameRecent.length - 1];
            const prevGame = gameRecent[gameRecent.length - 2];
            const latestStock = stockRecent[stockRecent.length - 1];
            const prevStock = stockRecent[stockRecent.length - 2];

            const toCandle = (p, l) => [p, l].map(d => ({
                o: parseFloat(d['开盘']), h: parseFloat(d['最高']),
                l: parseFloat(d['最低']), c: parseFloat(d['收盘'])
            }));
            const etfCandles = toCandle(prevEtf, latestEtf);
            const gameCandles = toCandle(prevGame, latestGame);
            const stockCandles = toCandle(prevStock, latestStock);

            const currentPrice = parseFloat(latestEtf['收盘']);
            const etfPsVals = etfPs.map(d => parseFloat(d['VWAP值'])).sort((a, b) => a - b);
            let support = null, resistance = null;
            for (let v of etfPsVals) {
                if (v < currentPrice) support = v;
                else if (!resistance) { resistance = v; break; }
            }
            if (!resistance) resistance = etfRecent.reduce((max, d) => Math.max(max, parseFloat(d['最高'])), 0);
            if (!support) support = resistance;

            document.getElementById('marketPrice').textContent = currentPrice.toFixed(2);
            document.getElementById('marketChange').textContent = '支撑 ' + support.toFixed(2) + ' | 压力 ' + resistance.toFixed(2);
            drawMiniCandles('miniEtf', etfCandles, support, resistance);

            const gamePrice = parseFloat(latestGame['收盘']);
            const gamePsVals = gamePs.map(d => parseFloat(d['VWAP值'])).sort((a, b) => a - b);
            let gameSupport = null, gameResistance = null;
            for (let v of gamePsVals) {
                if (v < gamePrice) gameSupport = v;
                else if (!gameResistance) { gameResistance = v; break; }
            }
            if (!gameResistance) gameResistance = gameRecent.reduce((max, d) => Math.max(max, parseFloat(d['最高'])), 0);
            if (!gameSupport) gameSupport = gameResistance;

            document.getElementById('sectorPrice').textContent = gamePrice.toFixed(3);
            document.getElementById('sectorChange').textContent = '支撑 ' + gameSupport.toFixed(3) + ' | 压力 ' + gameResistance.toFixed(3);
            drawMiniCandles('miniGame', gameCandles, gameSupport, gameResistance);

            const stockPrice = parseFloat(latestStock['收盘']);
            const stockPsVals = stockPs.map(d => parseFloat(d['VWAP值'])).sort((a, b) => a - b);
            let stockSupport = null, stockResistance = null;
            for (let v of stockPsVals) {
                if (v < stockPrice) stockSupport = v;
                else if (!stockResistance) { stockResistance = v; break; }
            }
            if (!stockResistance) stockResistance = stockRecent.reduce((max, d) => Math.max(max, parseFloat(d['最高'])), 0);
            if (!stockSupport) stockSupport = stockResistance;

            document.getElementById('stockPrice').textContent = stockPrice.toFixed(2);
            document.getElementById('stockChange').textContent = '支撑 ' + stockSupport.toFixed(2) + ' | 压力 ' + stockResistance.toFixed(2);
            drawMiniCandles('miniStock', stockCandles, stockSupport, stockResistance);

            document.getElementById('updateDate').textContent = '最新数据: ' + latestEtf['日期'];

            const latestVwap = szVwap && szVwap.length > 0 ? parseFloat(szVwap[szVwap.length - 1]['移动VWAP']) : null;

            function createChart(id, labels, priceData, psData, vwapValue, title) {
                const values = priceData.filter(v => v !== null && !isNaN(v));
                const minVal = Math.min(...values);
                const maxVal = Math.max(...values);
                const mean = (minVal + maxVal) / 2;
                const range = maxVal - minVal;
                const yMin = mean - 0.75 * range;
                const yMax = mean + 0.75 * range;

                const datasets = [{
                    label: title, data: priceData, borderColor: '#2563eb',
                    backgroundColor: 'rgba(37,99,235,0.1)', fill: true, tension: 0.4
                }];
                psData.forEach((ps, i) => {
                    datasets.push({
                        label: ps['指标'], data: Array(priceData.length).fill(parseFloat(ps['VWAP值'])),
                        borderColor: i % 2 === 0 ? '#ef4444' : '#f59e0b',
                        borderDash: [5, 5], borderWidth: 1, pointRadius: 0, fill: false,
                        skipTooltip: true
                    });
                });
                if (vwapValue !== null && !isNaN(vwapValue)) {
                    datasets.push({
                        label: '强弱分界', data: Array(priceData.length).fill(vwapValue),
                        borderColor: '#10b981', borderDash: [5, 5], borderWidth: 2.5, pointRadius: 0, fill: false,
                        skipTooltip: true
                    });
                }

                const chart = new Chart(document.getElementById(id), {
                    type: 'line', data: { labels, datasets },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                filter: (tooltipItem) => {
                                    return !tooltipItem.chart.data.datasets[tooltipItem.datasetIndex].skipTooltip;
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        scales: { y: { min: yMin, max: yMax } },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                allCharts.push(chart);
            }

            createChart('assetChart', etfRecent.map(d => d['日期']), etfRecent.map(d => parseFloat(d['收盘'])), etfPs, latestVwap, '上证指数');
            createChart('gameChart', gameRecent.map(d => d['日期']), gameRecent.map(d => parseFloat(d['收盘'])), gamePs, null, '游戏ETF');
            createChart('equityChart', stockRecent.map(d => d['日期']), stockRecent.map(d => parseFloat(d['收盘'])), stockPs, null, '巨人网络');
            document.querySelectorAll('.sk-overlay').forEach(el => el.remove());
        }

        async function init() {
            try {
                const data = await fetchData(baseUrl);
                renderUI(data);
                if (location.search.indexOf('realtime=1') >= 0) {
                    setTimeout(function() { remoteUpdateData(data); }, 500);
                }
            } catch (error) {
                console.error('加载失败:', error);
                showToast('加载数据失败', 'error', function() { location.reload(); });
            }
        }

        async function remoteUpdateData(existingData) {
            const nav = document.getElementById('updateNavBtn');
            const dateSpan = document.getElementById('updateDate');
            const pb = document.getElementById('progressBar');
            nav.classList.add('disabled');

            if (pb) pb.classList.add('active');
            try {
                const GITHUB_RAW = 'https://raw.githubusercontent.com/mangehua/market-dashboard/main';
                const data = existingData || await fetchData(GITHUB_RAW);
                const symbols = ['sh000001', 'sh516770', 'sz002558'];
                const names = ['etfHistory', 'gameData', 'stockData'];
                let hasTencentData = false;
                for (let i = 0; i < symbols.length; i++) {
                    try {
                        const res = await fetch('https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=' + symbols[i] + ',day,,,3,qfqa');
                        const json = await res.json();
                        const dayArr = json.data && json.data[symbols[i]] && json.data[symbols[i]].day;
                        if (!dayArr || dayArr.length === 0) continue;
                        const apiRow = dayArr[dayArr.length - 1];
                        if (!apiRow || apiRow.length < 6) continue;
                        const arr = data[names[i]];
                        if (!arr || arr.length === 0) continue;
                        const newRow = {
                            '日期': apiRow[0],
                            '股票代码': arr[arr.length - 1]['股票代码'],
                            '收盘': apiRow[2],
                            '开盘': apiRow[1],
                            '最高': apiRow[3],
                            '最低': apiRow[4],
                            '成交量': apiRow[5],
                            '成交额': '0'
                        };
                        if (arr[arr.length - 1]['日期'] === newRow['日期']) {
                            arr[arr.length - 1] = newRow;
                        } else if (arr[arr.length - 1]['日期'] < newRow['日期']) {
                            arr.push(newRow);
                        }
                        hasTencentData = true;
                    } catch (e) {}
                }
                renderUI(data);

                if (dateSpan) dateSpan.textContent = '最新数据: ' + new Date().toLocaleTimeString();
                if (hasTencentData) {
                    showToast('数据更新完成', 'success');
                } else {
                    showToast('更新完成，今日盘中数据暂未生成', 'success');
                }

            } catch (e) {
                    showToast('数据拉取失败，请检查网络后重试', 'error', function() { remoteUpdateData(); });
            }
            nav.classList.remove('disabled');
            if (pb) pb.classList.remove('active');
        }

        init();
    </script>
</body>
</html>
