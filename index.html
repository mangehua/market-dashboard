<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图谱分析</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="assets/common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="assets/common.js"></script>
    <style>
        .correlation-table { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; animation: cardFadeIn 0.4s ease both; }
        .correlation-table h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .correlation-table table { width: 100%; border-collapse: collapse; }
        .correlation-table th, .correlation-table td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .correlation-table th { background: var(--light); font-weight: 600; color: var(--gray); }
        .correlation-table td.positive { color: var(--success); font-weight: 600; }
        .correlation-table td.negative { color: var(--danger); font-weight: 600; }
        .correlation-table td.neutral { color: var(--gray); font-weight: 600; }
        .sk-row { height:20px; background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:sk-shimmer 1.5s ease-in-out infinite; border-radius:4px; }
    </style>
</head>
<body data-page="index">
    <div class="sidebar" id="appSidebar"></div>
    <div class="main">
        <div class="header">
            <h1>图谱分析</h1>
            <div class="header-right">
                <span class="date" id="updateDate">加载中...</span>
            </div>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-bar-inner"></div></div>

        <div class="chart-card">
            <div class="chart-title">游戏ETF vs 巨人网络</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="chart1"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">游戏ETF vs 市场中位涨跌幅</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="chart2"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">巨人网络 vs 市场中位涨跌幅</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="chart3"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">上证指数 vs 市场中位数累计净值</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="chart4"></canvas></div>
        </div>

        <div class="correlation-table">
            <h3>30日收益率相关性分析</h3>
            <table>
                <thead>
                    <tr>
                        <th>对比组合</th>
                        <th>相关系数</th>
                        <th>相关性</th>
                    </tr>
                </thead>
                <tbody id="correlationBody">
                    <tr><td colspan="3"><div class="sk-row"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function makeCrosshair(id) {
            let index = -1, locked = false;
            const plugin = {
                id: 'xhair-' + id,
                afterDraw(chart) {
                    if (!locked && index < 0) return;
                    const targetIdx = locked ? index : index;
                    if (targetIdx < 0 || targetIdx >= chart.config.data.labels.length || !chart.chartArea) return;
                    const ctx = chart.ctx;
                    const xAxis = chart.scales.x;
                    if (!xAxis) return;
                    const x = xAxis.getPixelForValue(targetIdx);
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(x, chart.chartArea.top);
                    ctx.lineTo(x, chart.chartArea.bottom);
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = '#000000';
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.restore();
                }
            };
            return {
                plugin,
                onHover(event, elements) {
                    if (!locked) {
                        if (elements.length > 0) { index = elements[0].index; } else { index = -1; }
                    }
                },
                onClick(event, elements) {
                    if (!locked) {
                        if (elements.length > 0) { locked = true; index = elements[0].index; }
                    } else {
                        locked = false; index = -1;
                    }
                }
            };
        }

        async function init() {
            try {
                const [market, gameData, stockData, shData] = await Promise.all([
                    fetchCSV(`${baseUrl}/stock_data/涨跌个数_市场.csv`),
                    fetchCSV(`${baseUrl}/stock_data/历史价格_游戏ETF.csv`),
                    fetchCSV(`${baseUrl}/stock_data/历史价格_巨人网络.csv`),
                    fetchCSV(`${baseUrl}/stock_data/历史价格_上证指数.csv`)
                ]);

                const m30 = market.slice(-30);
                const game30 = gameData.slice(-30);
                const stock30 = stockData.slice(-30);
                const labels = m30.map(d => d['date']);
                document.getElementById('updateDate').textContent = '最新数据: ' + m30[m30.length-1]['date'];

                function dailyReturns(arr) {
                    const rets = [0];
                    for (let i = 1; i < arr.length; i++) {
                        const p0 = parseFloat(arr[i-1]['收盘']);
                        const p1 = parseFloat(arr[i]['收盘']);
                        rets.push((p1 - p0) / p0 * 100);
                    }
                    return rets;
                }

                const gameRets = dailyReturns(game30);
                const stockRets = dailyReturns(stock30);
                const shRets = dailyReturns(shData.slice(-30));

                const medVals = m30.map(d => parseFloat(d['median_change'] || 0));

                // 4 charts with independent crosshair
                function createChart(id, title, data1, label1, color1, data2, label2, color2, yLabel) {
                    const xh = makeCrosshair(id);
                    new Chart(document.getElementById(id), {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                { label: label1, data: data1, borderColor: color1, tension: 0.4, pointRadius: 2 },
                                { label: label2, data: data2, borderColor: color2, tension: 0.4, pointRadius: 2 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: { y: { title: { display: true, text: yLabel } } },
                            plugins: {
                                legend: { position: 'bottom' },
                                tooltip: {
                                    mode: 'index', intersect: false,
                                    callbacks: {
                                        label: function(ctx) {
                                            const v = ctx.parsed.y;
                                            return ctx.dataset.label + ': ' + (v >= 0 ? '+' : '') + (typeof v === 'number' ? v.toFixed(2) : v);
                                        }
                                    }
                                }
                            },
                            interaction: { mode: 'index', intersect: false },
                            onClick: (e) => xh.onClick(e, e.chart.getElementsAtEventForMode(e, 'index', { mode: 'index', intersect: false }, false)),
                            onHover: (e, els) => xh.onHover(e, els)
                        },
                        plugins: [xh.plugin]
                    });
                }

                // ① 游戏ETF vs 巨人网络 (涨跌幅%)
                createChart('chart1', null, gameRets, '游戏ETF', '#2563eb', stockRets, '巨人网络', '#10b981', '涨跌幅(%)');
                // ② 游戏ETF vs 市场中位涨跌幅
                createChart('chart2', null, gameRets, '游戏ETF', '#2563eb', medVals, '市场中位涨跌幅', '#8b5cf6', '涨跌幅(%)');
                // ③ 巨人网络 vs 市场中位涨跌幅
                createChart('chart3', null, stockRets, '巨人网络', '#10b981', medVals, '市场中位涨跌幅', '#8b5cf6', '涨跌幅(%)');

                // ④ 上证指数 vs 市场中位数累计净值 (累计值)
                const shMap = {};
                shData.forEach(d => shMap[d['日期']] = parseFloat(d['收盘']));
                const sh30 = m30.map(d => shMap[d['date']] || null);
                const cumMed = [100];
                let cum = 100;
                for (let i = 1; i < m30.length; i++) {
                    cum = cum * (1 + parseFloat(m30[i]['median_change'] || 0) / 100);
                    cumMed.push(cum);
                }
                const shNorm = sh30.map(v => v !== null && sh30[0] !== null ? 100 * v / sh30[0] : null);
                const xh4 = makeCrosshair('chart4');
                new Chart(document.getElementById('chart4'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            { label: '中位数累计净值', data: cumMed, borderColor: '#8b5cf6', tension: 0.4, pointRadius: 0, borderWidth: 2 },
                            { label: '上证指数(归一)', data: shNorm, borderColor: '#ef4444', tension: 0.4, pointRadius: 0, borderWidth: 1.5, borderDash: [4,3] }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { y: { title: { display: true, text: '净值(基日=100)' } } },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                callbacks: {
                                    label: function(ctx) {
                                        if (ctx.parsed.y === null) return '';
                                        return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2);
                                    }
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        onClick: (e) => xh4.onClick(e, e.chart.getElementsAtEventForMode(e, 'index', { mode: 'index', intersect: false }, false)),
                        onHover: (e, els) => xh4.onHover(e, els)
                    },
                    plugins: [xh4.plugin]
                });

                // 30日收益率相关性 (6行, 全部用日收益率)
                function calcCorrelation(a, b) {
                    const n = Math.min(a.length, b.length);
                    if (n < 2) return 0;
                    const sa = a.slice(-n), sb = b.slice(-n);
                    const ma = sa.reduce((s, v) => s + v, 0) / n;
                    const mb = sb.reduce((s, v) => s + v, 0) / n;
                    let num = 0, d1 = 0, d2 = 0;
                    for (let i = 0; i < n; i++) {
                        const da = sa[i] - ma, db = sb[i] - mb;
                        num += da * db;
                        d1 += da * da;
                        d2 += db * db;
                    }
                    if (d1 === 0 || d2 === 0) return 0;
                    return num / Math.sqrt(d1 * d2);
                }

                function getCorrClass(r) {
                    if (r > 0.5) return 'positive';
                    if (r < -0.5) return 'negative';
                    return 'neutral';
                }
                function getCorrLabel(r) {
                    if (r > 0.7) return '强正相关';
                    if (r > 0.3) return '正相关';
                    if (r > -0.3) return '弱相关';
                    if (r > -0.7) return '负相关';
                    return '强负相关';
                }

                // Use return series (skip day 0 = 0)
                const gr = gameRets.slice(1);
                const sr = stockRets.slice(1);
                const shr = shRets.slice(1);
                const mr = medVals.slice(1);
                const pairs = [
                    ['上证 vs 游戏ETF', shr, gr],
                    ['上证 vs 巨人网络', shr, sr],
                    ['游戏ETF vs 巨人网络', gr, sr],
                    ['上证 vs 市场中位', shr, mr],
                    ['游戏ETF vs 市场中位', gr, mr],
                    ['巨人网络 vs 市场中位', sr, mr],
                ];

                document.getElementById('correlationBody').innerHTML = pairs.map(p => {
                    const r = calcCorrelation(p[1], p[2]);
                    return `<tr><td>${p[0]}</td><td class="${getCorrClass(r)}">${r.toFixed(2)}</td><td class="${getCorrClass(r)}">${getCorrLabel(r)}</td></tr>`;
                }).join('');
                document.querySelectorAll('.sk-overlay').forEach(el => el.remove());
            } catch (error) {
                console.error('加载失败:', error);
                showToast('加载数据失败', 'error', function() { location.reload(); });
            }
        }

        init();
    </script>
</body>
</html>
