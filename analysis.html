<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信号收集</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="assets/common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="assets/common.js"></script>
    <style>
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); animation: cardFadeIn 0.4s ease both; }
        .stat-label { color: var(--gray); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
        .stat-change { font-size: 13px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        .stat-change.warning { color: var(--warning); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: white; margin-left: 8px; }
        .badge.success { background: var(--success); }
        .badge.danger { background: var(--danger); }
        .badge.warning { background: var(--warning); }
        .chart-container { height: 300px; }

        .bp-table { width:100%; border-collapse:collapse; font-size:13px; }
        .bp-table th { text-align:left; padding:6px 8px; color:var(--gray); font-weight:400; border-bottom:1px solid var(--border); }
        .bp-table td { padding:6px 8px; border-bottom:1px solid var(--border); }
    </style>
</head>
<body data-page="analysis">
    <div class="sidebar" id="appSidebar"></div>
    <div class="main">
        <div class="header">
            <h1>信号收集</h1>
            <div class="header-right">
                <span class="date" id="updateDate">加载中...</span>
            </div>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-bar-inner"></div></div>

        <h3 style="margin-bottom: 12px;">市场情绪指标</h3>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">涨跌幅中位数</div>
                <div class="stat-value" id="medianChange">-</div>
                <div class="stat-change" id="medianStatus">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">涨停家数</div>
                <div class="stat-value" id="limitUpCount">-</div>
                <div class="stat-change" id="limitUpStatus">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">全市场成交额</div>
                <div class="stat-value" id="volumeValue">-</div>
                <div class="stat-change" id="volumeStatus">-</div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title">五维信号评分</div>
            <div id="breakdownTable"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">上证指数 vs 市场中位数累计净值</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="shIndexChart"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">涨跌停统计</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="limitChart"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">创业+科创+北交所涨跌停</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="limitOtherChart"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">市场中位涨跌幅</div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="marketVolumeCumChart"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">全市场成交额 <span style="color:var(--gray);font-size:13px;font-weight:400;">柱: 日成交额 / 线: 10日均值</span></div>
            <div class="chart-container"><div class="sk-overlay"></div><canvas id="volumeChart"></canvas></div>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const [sentiment, market, volume, szPrice] = await Promise.all([
                    fetchCSV('stock_data/情绪指数.csv', true),
                    fetchCSV('stock_data/涨跌个数_市场.csv', true),
                    fetchCSV('stock_data/全市场成交额.csv', true),
                    fetchCSV('stock_data/历史价格_上证指数.csv', true)
                ]);

                if (market.length === 0) throw new Error('市场数据为空');
                const nextDown = {};
                for (let i = 0; i < szPrice.length - 1; i++) {
                    const curClose = parseFloat(szPrice[i]['收盘']);
                    const nxtClose = parseFloat(szPrice[i + 1]['收盘']);
                    if (!isNaN(curClose) && !isNaN(nxtClose)) {
                        nextDown[szPrice[i]['日期']] = nxtClose < curClose;
                    }
                }

                const mLast = market[market.length-1];
                const mPrev = market[market.length-2];
                document.getElementById('updateDate').textContent = '最新数据: ' + mLast['date'];

                // 五维信号评分
                const sLast = sentiment[sentiment.length - 1];
                function pctRank(arr, val) {
                    const less = arr.filter(v => v < val).length;
                    const equal = arr.filter(v => v === val).length;
                    return Math.round((less + 0.5 * equal) / arr.length * 100);
                }
                const flipDims = ['极端涨停', '极端普涨', '支撑压力'];
                const raw60 = sentiment.slice(-61, -1).map(d => parseFloat(d['sentiment_raw']));
                const dimCfgs = [
                    { label: '极端涨停', dim: 'dim_limit_up', scoreKey: 'limit_up_score', color: '#ef4444' },
                    { label: '极端普涨', dim: 'dim_median', scoreKey: 'median_score', color: '#f59e0b' },
                    { label: '市场趋势', dim: 'dim_trend', scoreKey: 'ma_score', color: '#3b82f6' },
                    { label: '市场成交量', dim: 'dim_volume', scoreKey: 'volume_score', color: '#10b981' },
                    { label: '支撑压力', dim: 'dim_position', scoreKey: 'position_score', color: '#8b5cf6' }
                ];
                const dims = dimCfgs.map(c => {
                    const val = parseInt(sLast[c.dim]);
                    const vals60 = sentiment.slice(-61, -1).map(d => parseFloat(d[c.scoreKey]));
                    const rawPct = pctRank(vals60, parseFloat(sLast[c.scoreKey]));
                    const pct = flipDims.includes(c.label) ? 100 - rawPct : rawPct;
                    const dim60 = sentiment.slice(-121, -1).map(d => parseInt(d[c.dim]));
                    // 信号统计
                    let signalStats;
                    if (['极端涨停', '极端普涨'].includes(c.label)) {
                        const allDim = sentiment.slice(-120).map(d => parseInt(d[c.dim]));
                        const extremeIdx = [];
                        allDim.forEach((v, i) => { if (v !== 0) extremeIdx.push(i); });
                        const isNow = val !== 0;
                        const n = extremeIdx.length;
                        const lastIdx = isNow ? (n >= 2 ? extremeIdx[n - 2] : -1) : (n >= 1 ? extremeIdx[n - 1] : -1);
                        const lastExtreme = lastIdx >= 0 ? allDim.length - 1 - lastIdx : '-';
                        const avgInterval = n >= 3 ? ((extremeIdx[n - 1] - extremeIdx[0]) / (n - 1)).toFixed(1) : '-';
                        const extremeProb = Math.round(dim60.filter(v => v !== 0).length / dim60.length * 100);
                        signalStats = `极端事件${extremeProb}% / 间隔${lastExtreme}d / 均间隔${avgInterval}d`;
                    } else if (['市场趋势', '市场成交量'].includes(c.label)) {
                        const isHealthy = val === 20;
                        const healthData = sentiment.map(d => parseInt(d[c.dim]) === 20);
                        let streakCurrent = 0;
                        for (let i = healthData.length - 1; i >= 0; i--) {
                            if (healthData[i] === isHealthy) streakCurrent++;
                            else break;
                        }
                        const recent60 = healthData.slice(-61, -1);
                        let streaks = [], cur = 1;
                        for (let i = 1; i < recent60.length; i++) {
                            if (recent60[i] === recent60[i-1]) cur++;
                            else { streaks.push(cur); cur = 1; }
                        }
                        streaks.push(cur);
                        const streakAvg = streaks.reduce((a,b)=>a+b,0) / streaks.length;
                        const label = c.label === '市场趋势' ? '价' : '量';
                        signalStats = `${label}${isHealthy ? '健康' : '不健康'}持续${streakCurrent}d / 均${streakAvg.toFixed(1)}d`;
                    } else {
                        if (val === 20) {
                            const prob = Math.round(dim60.filter(v => v === 20).length / dim60.length * 100);
                            let upCnt = 0, tot = 0;
                            const recent120 = sentiment.slice(Math.max(0, sentiment.length - 121), -1);
                            for (const r of recent120) {
                                if (parseInt(r['dim_position']) === 20) {
                                    const d = (r['date'] || '').trim();
                                    if (d in nextDown) { tot++; if (!nextDown[d]) upCnt++; }
                                }
                            }
                            const upPct = tot ? Math.round(upCnt / tot * 100) : 0;
                            signalStats = `支撑信号频率${prob}% / 次日上涨频率${upPct}%`;
                        }
                        else if (val === -20) {
                            const prob = Math.round(dim60.filter(v => v === -20).length / dim60.length * 100);
                            let downCnt = 0, tot = 0;
                            const recent120 = sentiment.slice(Math.max(0, sentiment.length - 121), -1);
                            for (const r of recent120) {
                                if (parseInt(r['dim_position']) === -20) {
                                    const d = (r['date'] || '').trim();
                                    if (d in nextDown) { tot++; if (nextDown[d]) downCnt++; }
                                }
                            }
                            const downPct = tot ? Math.round(downCnt / tot * 100) : 0;
                            signalStats = `压力信号频率${prob}% / 次日下跌频率${downPct}%`;
                        } else signalStats = '-';
                    }
                    let desc;
                    if (c.label === '极端涨停') desc = val === 20 ? '涨停荒抄底' : val === -20 ? '涨停潮预警' : '正常';
                    else if (c.label === '极端普涨') desc = val === 20 ? '极端悲观预案' : val === -20 ? '极端乐观预警' : '正常';
                    else if (c.label === '市场趋势') desc = val === 20 ? '价健康' : '价不健康';
                    else if (c.label === '市场成交量') desc = val === 20 ? '量健康' : '量不健康';
                    else desc = val === 20 ? '靠近支撑位' : val === -20 ? '靠近压力位' : '正常';
                    return { label: c.label, score: val, color: c.color, desc, pct, signalStats };
                });
                let tableHtml = '<table class="bp-table"><tr><th>维度</th><th style="text-align:center;">信号</th><th style="text-align:right;color:#94a3b8;font-weight:400;">信号排名</th><th style="text-align:center;color:#94a3b8;font-weight:400;">信号统计</th></tr>';
                dims.forEach(function(d) {
                    const descCls = d.score > 0 ? 'color:#10b981' : d.score < 0 ? 'color:#ef4444' : 'color:#94a3b8';
                    const rankPos = 100 - d.pct;
                    const rankCls = rankPos <= 20 ? 'color:#10b981' : rankPos >= 80 ? 'color:#ef4444' : 'color:#94a3b8';
                    tableHtml += '<tr><td><span style="color:' + d.color + ';font-weight:600;">●</span> ' + d.label + '</td><td style="text-align:center;font-size:12px;' + descCls + ';">' + d.desc + '</td><td style="text-align:right;' + rankCls + ';">前' + rankPos + '%</td><td style="text-align:center;font-size:12px;color:var(--gray);">' + d.signalStats + '</td></tr>';
                });
                tableHtml += '</table>';
                document.getElementById('breakdownTable').innerHTML = tableHtml;

                // 市场情绪指标
                const avgLimitUp = Math.round(market.reduce((s, d) => s + parseInt(d['limit_up']), 0) / market.length);
                const medLast = parseFloat(mLast['median_change']);
                const medPrev = parseFloat(mPrev['median_change']);
                const medChange = (medLast - medPrev).toFixed(2);
                document.getElementById('medianChange').textContent = (medLast >= 0 ? '+' : '') + medLast.toFixed(2) + '%';
                document.getElementById('medianStatus').innerHTML =
                    `<span class="badge ${parseFloat(medChange) >= 0 ? 'success' : 'danger'}">${medChange >= 0 ? '+' : ''}${medChange}%</span> ` +
                    (medLast >= 0
                        ? `<span class="badge success">整体上涨</span>`
                        : `<span class="badge danger">整体下跌</span>`);

                const limitUpChange = parseInt(mLast['limit_up']) - parseInt(mPrev['limit_up']);
                document.getElementById('limitUpCount').textContent = mLast['limit_up'];
                document.getElementById('limitUpStatus').innerHTML =
                    `<span class="badge ${limitUpChange >= 0 ? 'success' : 'danger'}">${limitUpChange >= 0 ? '+' : ''}${limitUpChange}</span> ` +
                    (parseInt(mLast['limit_up']) >= avgLimitUp
                        ? `<span class="badge success">高于均值 ${avgLimitUp}</span>`
                        : `<span class="badge danger">低于均值 ${avgLimitUp}</span>`);

                const vLast = volume[volume.length-1];
                const vPrev = volume[volume.length-2];
                const avgVol = Math.round(parseFloat(vLast['成交额60日均值'])/1e11);
                const currentVol = (parseFloat(vLast['成交额(元)'])/1e11).toFixed(2);
                const prevVol = (parseFloat(vPrev['成交额(元)'])/1e11).toFixed(2);
                const volChange = (parseFloat(currentVol) - parseFloat(prevVol)).toFixed(2);
                document.getElementById('volumeValue').textContent = currentVol + ' 千亿';
                document.getElementById('volumeStatus').innerHTML =
                    `<span class="badge ${parseFloat(volChange) >= 0 ? 'success' : 'danger'}">${parseFloat(volChange) >= 0 ? '+' : ''}${volChange}</span> ` +
                    (parseFloat(currentVol) >= avgVol
                        ? `<span class="badge success">放量 (均值 ${avgVol} 千亿)</span>`
                        : `<span class="badge danger">缩量 (均值 ${avgVol} 千亿)</span>`);

                // 图表
                const m60 = market.slice(-60);
                const shMap = {};
                szPrice.forEach(d => shMap[d['日期']] = parseFloat(d['收盘']));
                const sh60 = m60.map(d => shMap[d['date']] || null);
                const cumMed = [100];
                let cum = 100;
                for (let i = 1; i < m60.length; i++) {
                    cum = cum * (1 + parseFloat(m60[i]['median_change'] || 0) / 100);
                    cumMed.push(cum);
                }
                const shNorm = sh60.map(v => v !== null && sh60[0] !== null ? 100 * v / sh60[0] : null);
                const c0 = new Chart(document.getElementById('shIndexChart'), {
                    type: 'line',
                    data: {
                        labels: m60.map(d => d['date']),
                        datasets: [
                            { label: '中位数累计净值', data: cumMed, borderColor: '#8b5cf6', tension: 0.4, pointRadius: 0, borderWidth: 2 },
                            { label: '上证指数(归一)', data: shNorm, borderColor: '#ef4444', tension: 0.4, pointRadius: 0, borderWidth: 1.5, borderDash: [4,3] }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { y: { title: { display: true, text: '净值(基日=100)' } } },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                callbacks: {
                                    label: function(ctx) {
                                        if (ctx.parsed.y === null) return '';
                                        return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2);
                                    }
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                allCharts.push(c0);

                const avgLimitUp60 = Math.round(m60.reduce((s, d) => s + parseInt(d['limit_up'] || 0),0) / m60.length);
                const avgLimitDown60 = Math.round(m60.reduce((s, d) => s + parseInt(d['limit_down'] || 0),0) / m60.length);
                const c2 = new Chart(document.getElementById('limitChart'), {
                    type: 'line',
                    data: {
                        labels: m60.map(d => d['date']),
                        datasets: [
                            { label: '涨停', data: m60.map(d => parseInt(d['limit_up'] || 0)), borderColor: '#ef4444', tension: 0.4, pointRadius: 2 },
                            { label: '跌停', data: m60.map(d => parseInt(d['limit_down'] || 0)), borderColor: '#10b981', tension: 0.4, pointRadius: 2 },
                            { label: '涨停均值:' + avgLimitUp60, data: Array(60).fill(avgLimitUp60), borderColor: '#ef4444', borderDash: [5,5], borderWidth: 1, pointRadius: 0, fill: false, skipTooltip: true },
                            { label: '跌停均值:' + avgLimitDown60, data: Array(60).fill(avgLimitDown60), borderColor: '#10b981', borderDash: [5,5], borderWidth: 1, pointRadius: 0, fill: false, skipTooltip: true }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { y: { beginAtZero: false } },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                filter: (tooltipItem) => !tooltipItem.chart.data.datasets[tooltipItem.datasetIndex].skipTooltip
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                allCharts.push(c2);

                // 其他板块涨跌停
                const avgOtherUp = Math.round(m60.reduce((s, d) => s + parseInt(d['limit_up_other'] || 0),0) / m60.length);
                const avgOtherDown = Math.round(m60.reduce((s, d) => s + parseInt(d['limit_down_other'] || 0),0) / m60.length);
                const c5 = new Chart(document.getElementById('limitOtherChart'), {
                    type: 'line',
                    data: {
                        labels: m60.map(d => d['date']),
                        datasets: [
                            { label: '创业+科创+北交涨停', data: m60.map(d => parseInt(d['limit_up_other'] || 0)), borderColor: '#f97316', tension: 0.4, pointRadius: 2 },
                            { label: '创业+科创+北交跌停', data: m60.map(d => parseInt(d['limit_down_other'] || 0)), borderColor: '#06b6d4', tension: 0.4, pointRadius: 2 },
                            { label: '其他涨停均值:' + avgOtherUp, data: Array(60).fill(avgOtherUp), borderColor: '#f97316', borderDash: [5,5], borderWidth: 1, pointRadius: 0, fill: false, skipTooltip: true },
                            { label: '其他跌停均值:' + avgOtherDown, data: Array(60).fill(avgOtherDown), borderColor: '#06b6d4', borderDash: [5,5], borderWidth: 1, pointRadius: 0, fill: false, skipTooltip: true }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { y: { beginAtZero: false } },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                filter: (tooltipItem) => !tooltipItem.chart.data.datasets[tooltipItem.datasetIndex].skipTooltip
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                allCharts.push(c5);

                const volByDate = {};
                volume.forEach(d => volByDate[d['日期']] = parseFloat(d['成交额(元)'] || 0) / 1e11);
                const volMatched60 = m60.map(d => volByDate[d['date']] || null);
                const medLine = m60.map(d => parseFloat(d['median_change'] || 0));
                const medMean60 = medLine.reduce((a, b) => a + b, 0) / medLine.length;
                const labels60 = m60.map(d => d['date']);

                const c6 = new Chart(document.getElementById('marketVolumeCumChart'), {
                    type: 'line',
                    data: {
                        labels: labels60,
                        datasets: [
                            {
                                label: '中位数涨跌幅',
                                data: medLine,
                                borderColor: '#8b5cf6', tension: 0.4, pointRadius: 2, yAxisID: 'y'
                            },
                            {
                                label: '60日均值',
                                data: Array(labels60.length).fill(medMean60),
                                borderColor: '#ef4444',
                                borderDash: [5, 5],
                                borderWidth: 1.5,
                                pointRadius: 0,
                                fill: false,
                                tension: 0,
                                yAxisID: 'y'
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { position: 'left', title: { display: true, text: '涨跌幅(%)' } }
                        },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                callbacks: {
                                    label: function(ctx) {
                                        if (ctx.parsed.y === null) return '';
                                        const v = ctx.parsed.y;
                                        return ctx.dataset.label + ': ' + (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
                                    }
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                allCharts.push(c6);

                // 成交量 standalone chart (with 强弱分界)
                const volAvgMatched = m60.map(d => {
                    const v = volByDate[d['date']];
                    return v !== null ? v : null;
                });
                const volMA10 = [];
                volume.forEach(d => {
                    const dt = d['日期'];
                    const m10val = parseFloat(d['成交额10日均值'] || 0) / 1e11;
                    volByDate[dt + '_ma'] = m10val;
                });
                const volMA10matched = m60.map(d => volByDate[d['date'] + '_ma'] || null);

                const c7 = new Chart(document.getElementById('volumeChart'), {
                    type: 'line',
                    data: {
                        labels: labels60,
                        datasets: [
                            {
                                label: '成交额(千亿)',
                                data: volAvgMatched,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16,185,129,0.06)',
                                borderWidth: 2,
                                tension: 0.3,
                                fill: true,
                                pointRadius: 0,
                                yAxisID: 'y',
                                order: 2
                            },
                            {
                                type: 'line',
                                label: '10日均值',
                                data: volMA10matched,
                                borderColor: '#f59e0b',
                                borderWidth: 2,
                                borderDash: [6, 3],
                                pointRadius: 0,
                                yAxisID: 'y',
                                order: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { position: 'left', title: { display: true, text: '成交额(千亿)' } }
                        },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                callbacks: {
                                    label: function(ctx) {
                                        if (ctx.parsed.y === null) return '';
                                        const v = ctx.parsed.y;
                                        if (ctx.dataset.label === '10日均值') {
                                            return ctx.dataset.label + ': ' + v.toFixed(2) + ' 千亿';
                                        }
                                        return ctx.dataset.label + ': ' + v.toFixed(2) + ' 千亿';
                                    }
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                allCharts.push(c7);
                document.querySelectorAll('.sk-overlay').forEach(el => el.remove());
            } catch (e) {
                console.error('Error loading data:', e);
                showToast('加载数据失败', 'error', function() { location.reload(); });
            }
        }

        init();
    </script>
</body>
