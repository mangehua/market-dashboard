<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周期研判</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="assets/common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="assets/common.js"></script>
    <style>
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); animation: cardFadeIn 0.4s ease both; }
        .stat-card .label { color: var(--gray); font-size: 13px; margin-bottom: 4px; }
        .stat-card .value { font-size: 22px; font-weight: 600; }
        .stat-card .sub { font-size: 12px; color: var(--gray); margin-top: 4px; }

        .cycle-tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
        .cycle-tbl th { text-align: left; padding: 10px 12px; color: var(--gray); font-weight: 500; border-bottom: 2px solid var(--border); font-size: 13px; }
        .cycle-tbl td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .cycle-tbl tr:last-child td { border-bottom: none; }
        .cycle-tbl .date-col { color: var(--gray); font-size: 13px; white-space: nowrap; }
        .cycle-tbl .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
        .cycle-tbl .row-switch td { background: #f8fafc; }
        .cycle-tbl .arrow { color: var(--gray); font-size: 12px; margin: 0 4px; }

        .legend-box { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
        .subtitle { color: var(--gray); font-size: 14px; font-weight: 400; margin-left: 8px; }
    </style>
</head>
<body data-page="track">
    <div class="sidebar" id="appSidebar"></div>
    <div class="main">
        <div class="header">
            <h1>市场周期研判</h1>
            <div class="header-right">
                <span class="date" id="updateDate">加载中...</span>
            </div>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-bar-inner"></div></div>

        <div class="chart-card">
            <div class="chart-title">上证指数 + 情绪周期</div>
            <div class="chart-container" style="height:450px;"><div class="sk-overlay"></div><canvas id="mainCycleChart"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">周期切换记录 <span style="color:var(--gray);font-size:13px;font-weight:400;">仅显示强度信号+持续≥3天, 最近5条</span></div>
            <div id="cycleTableContainer"><div style="color:var(--gray);font-size:14px;padding:8px 0;">加载中...</div></div>
        </div>
    </div>

    <script>
        const ZONE_COLORS = {
            '极差': { fill: 'rgba(239,68,68,0.08)', bar: '#ef4444', tag: '#fee2e2', tagText: '#dc2626' },
            '偏差': { fill: 'rgba(251,146,60,0.08)', bar: '#f97316', tag: '#ffedd5', tagText: '#ea580c' },
            '中性偏差': { fill: 'rgba(234,179,8,0.06)', bar: '#eab308', tag: '#fef9c3', tagText: '#ca8a04' },
            '中性偏好': { fill: 'rgba(59,130,246,0.06)', bar: '#3b82f6', tag: '#dbeafe', tagText: '#2563eb' },
            '良好': { fill: 'rgba(16,185,129,0.08)', bar: '#10b981', tag: '#d1fae5', tagText: '#059669' },
            '极好': { fill: 'rgba(139,92,246,0.08)', bar: '#8b5cf6', tag: '#ede9fe', tagText: '#7c3aed' }
        };

        const ZONE_COLORS_BG = {
            '弱': '#fee2e2',
            '偏弱': '#ffedd5',
            '弱+偏': '#ffedd5',
            '弱偏强': '#fef9c3',
            '局域顶': '#d1fae5',
            '强': '#dbeafe',
            '强+区': '#ede9fe'
        };

        function zoneBgColor(zone) {
            return ZONE_COLORS_BG[zone] || '#f1f5f9';
        }

        function signalColor(signal) {
            return ZONE_COLORS[signal] || { fill: 'rgba(100,116,139,0.06)', bar: '#64748b', tag: '#f1f5f9', tagText: '#64748b' };
        }

        const ZONE_COLORS_BG_DIM = {
            '弱': 'rgba(239,68,68,0.06)',
            '偏弱': 'rgba(251,146,60,0.06)',
            '弱+偏': 'rgba(251,146,60,0.06)',
            '弱偏强': 'rgba(234,179,8,0.06)',
            '局域顶': 'rgba(16,185,129,0.06)',
            '强': 'rgba(59,130,246,0.06)',
            '强+区': 'rgba(139,92,246,0.06)',
        };

        function zoneBgColorDim(zone) {
            return ZONE_COLORS_BG_DIM[zone] || 'rgba(148,163,184,0.04)';
        }

        const zoneBackgroundPlugin = {
            id: 'zoneBackground',
            beforeDraw(chart) {
                const zones = chart.zoneLabels;
                if (!zones || !chart.chartArea) return;
                const ctx = chart.ctx;
                const xAxis = chart.scales.x;
                if (!xAxis) return;
                const area = chart.chartArea;
                let i = 0;
                while (i < zones.length) {
                    const currentZone = zones[i];
                    const color = zoneBgColorDim(currentZone);
                    let j = i;
                    while (j < zones.length && zones[j] === currentZone) j++;
                    const x1 = xAxis.getPixelForValue(i);
                    const x2 = xAxis.getPixelForValue(j - 1);
                    if (x1 !== undefined && x2 !== undefined) {
                        const pixelX1 = Math.max(area.left, Math.min(area.right, x1));
                        const pixelX2 = Math.max(area.left, Math.min(area.right, x2));
                        if (color !== 'transparent') {
                            ctx.save();
                            ctx.fillStyle = color;
                            ctx.fillRect(pixelX1 - 4, area.top, pixelX2 - pixelX1 + 8, area.bottom - area.top);
                            ctx.restore();
                        }
                    }

                    const segLen = j - i;
                    const isLast = j >= zones.length;
                    if ((segLen >= 3 || isLast) && x1 !== undefined && x2 !== undefined) {
                        const midX = (Math.max(area.left, Math.min(area.right, x1)) + Math.min(area.right, Math.max(area.left, x2))) / 2;
                        ctx.save();
                        ctx.font = '11px -apple-system, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'top';
                        const zoneColors = {
                            '弱': '#dc2626', '偏弱': '#ea580c', '弱+偏': '#ea580c',
                            '弱偏强': '#ca8a04', '局域顶': '#059669', '强': '#2563eb', '强+区': '#7c3aed'
                        };
                        ctx.fillStyle = zoneColors[currentZone] || '#64748b';
                        ctx.globalAlpha = 0.85;
                        ctx.fillText(currentZone, midX, area.top + 4);
                        ctx.restore();
                    }

                    i = j;
                }

                // Quality switch dashed lines
                const qs = chart.qualitySwitches;
                if (qs && qs.length) {
                    ctx.save();
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([5, 5]);
                    qs.forEach(s => {
                        const x = xAxis.getPixelForValue(s.dataIndex);
                        if (x !== undefined && x >= area.left && x <= area.right) {
                            ctx.strokeStyle = s.type === 'entry' ? '#22c55e' : '#ef4444';
                            ctx.beginPath();
                            ctx.moveTo(x, area.top + 22);
                            ctx.lineTo(x, area.bottom);
                            ctx.stroke();
                        }
                    });
                    ctx.restore();
                }
            }
        };

        Chart.register(zoneBackgroundPlugin);

        async function init() {
            try {
                const [sentimentData, shData, volData] = await Promise.all([
                    fetchCSV(baseUrl + '/stock_data/情绪指数.csv'),
                    fetchCSV(baseUrl + '/stock_data/历史价格_上证指数.csv'),
                    fetchCSV(baseUrl + '/stock_data/全市场成交额.csv')
                ]);

                // 显示口径：CSV中的'强+量'在本页统一显示为'局域顶'
                sentimentData.forEach(d => { if (d.zone === '强+量') d.zone = '局域顶'; });

                const dateSpan = document.getElementById('updateDate');
                if (sentimentData.length > 0) {
                    dateSpan.textContent = '最新数据: ' + sentimentData[sentimentData.length - 1].date;
                }

                const dates = sentimentData.map(d => d.date);
                const sentiment = sentimentData.map(d => parseFloat(d.sentiment));
                const zones = sentimentData.map(d => d.zone);
                const signals = sentimentData.map(d => d.signal);

                // Volume data: compute 5日均量线
                const volByDate = {};
                volData.forEach(d => volByDate[d['日期']] = parseFloat(d['成交额(元)']));
                const rawVol = dates.map(d => volByDate[d] || null);
                const volMA5 = rawVol.map((v, i) => {
                    if (v === null) return null;
                    let sum = 0, cnt = 0;
                    for (let k = Math.max(0, i - 4); k <= i; k++) {
                        if (rawVol[k] !== null) { sum += rawVol[k]; cnt++; }
                    }
                    return cnt > 0 ? sum / cnt : null;
                });
                const volMA60 = dates.map(d => volByDate[d] ? parseFloat(volData.find(v => v['日期'] === d)['成交额60日均值']) : null);

                // Align SH data with sentiment dates
                const shByDate = {};
                shData.forEach(d => shByDate[d['日期']] = parseFloat(d['收盘']));
                const shPrices = dates.map(d => shByDate[d] || null);
                const shValid = shPrices.filter(v => v !== null);
                const shMin = Math.min(...shValid);
                const shMax = Math.max(...shValid);

                // Main cycle chart
                const mainCtx = document.getElementById('mainCycleChart');
                const mcChart = new Chart(mainCtx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            {
                                label: '上证指数',
                                data: shPrices,
                                borderColor: '#1e293b',
                                borderWidth: 1.5,
                                pointRadius: 0,
                                tension: 0.1,
                                yAxisID: 'y',
                                order: 2
                            },
                            {
                                label: '情绪指数',
                                data: sentiment,
                                borderColor: 'rgba(139,92,246,0.5)',
                                backgroundColor: 'rgba(139,92,246,0.08)',
                                borderWidth: 1.5,
                                pointRadius: 0,
                                tension: 0.3,
                                yAxisID: 'y1',
                                fill: true,
                                order: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: {
                                position: 'left',
                                title: { display: true, text: '上证指数' },
                                min: shMin * 0.97,
                                max: shMax * 1.03,
                                grid: { color: '#f1f5f9' }
                            },
                            y1: {
                                position: 'right',
                                min: 0, max: 100,
                                title: { display: true, text: '情绪分' },
                                grid: { drawOnChartArea: false },
                                ticks: { stepSize: 20 }
                            }
                        },
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                mode: 'index', intersect: false,
                                callbacks: {
                                    label: function(ctx) {
                                        const idx = ctx.dataIndex;
                                        const z = zones[idx] || '';
                                        const s = signals[idx] || '';
                                        if (ctx.dataset.yAxisID === 'y') {
                                            return '上证指数: ' + (ctx.parsed.y !== null ? ctx.parsed.y.toFixed(2) : 'N/A');
                                        }
                                        return '情绪: ' + (ctx.parsed.y !== null ? ctx.parsed.y.toFixed(0) + '  [' + z + '] ' + s : 'N/A');
                                    }
                                }
                            }
                        },
                        onClick: (event) => { if (event.chart) toggleCrosshair(event.chart, event); },
                        onHover: (event, elements) => {
                            if (!isLocked) {
                                if (elements.length > 0 && event.chart) syncCrosshair(event.chart, elements[0].index);
                                else { syncIndex = -1; allCharts.forEach(c => c.update('none')); }
                            }
                        }
                    },
                    plugins: [crosshairPlugin]
                });
                mcChart.zoneLabels = zones;
                allCharts.push(mcChart);

                // Cycle switch table
                let prevZone = '';
                const switches = [];
                if (sentimentData.length > 0) {
                    switches.push({
                        date: sentimentData[0].date,
                        from: '(初始)',
                        to: sentimentData[0].zone,
                        sentiment: parseFloat(sentimentData[0].sentiment),
                        signal: sentimentData[0].signal,
                        dataIndex: 0,
                    });
                }
                sentimentData.forEach((row, i) => {
                    const z = row.zone;
                    if (i > 0 && z !== prevZone) {
                        switches.push({
                            date: row.date,
                            from: prevZone,
                            to: z,
                            sentiment: parseFloat(row.sentiment),
                            signal: row.signal,
                            dataIndex: i,
                        });
                    }
                    prevZone = z;
                });

                // Compute duration for each entry
                for (let i = 0; i < switches.length; i++) {
                    const dayDiff = i + 1 < switches.length
                        ? (new Date(switches[i + 1].date) - new Date(switches[i].date)) / (1000 * 86400)
                        : (new Date(sentimentData[sentimentData.length - 1].date) - new Date(switches[i].date)) / (1000 * 86400);
                    switches[i].duration = Math.round(dayDiff);
                }

                // Filter: only strong signals + duration >= 3 days, keep last 5
                const strongSignals = ['极好', '良好', '极差', '偏差'];
                const filteredSwitches = switches.filter(s =>
                    s.duration >= 3 && strongSignals.includes(s.signal)
                );
                const last5 = filteredSwitches.slice(-5);

                // Quality switch markers for chart
                const strongZones = ['强', '局域顶', '强+区'];
                const qualitySwitches = [];
                switches.forEach(s => {
                    const isLatest = s === switches[switches.length - 1];
                    const ok = (dur) => isLatest || dur >= 3;
                    const isEntry = strongZones.includes(s.to) && ['极好', '良好'].includes(s.signal) && ok(s.duration);
                    if (isEntry) qualitySwitches.push({ ...s, type: 'entry' });
                });
                // Volume top warning: 前置(前5≥3日>MA60×1.1) + 强区 + 天量天价(N=20, 价≥高点97%)
                let volTopCooldown = 0;
                dates.forEach((d, i) => {
                    if (i < 20) return;
                    if (volTopCooldown > 0) { volTopCooldown--; return; }
                    // B: only in strong zones
                    if (!['强', '局域顶', '强+区'].includes(zones[i])) return;
                    // D: at least 3 of last 5 days > MA60 × 1.1
                    let countAbove = 0;
                    for (let k = i - 5; k < i; k++) {
                        if (rawVol[k] !== null && volMA60[k] !== null && rawVol[k] > volMA60[k] * 1.1) countAbove++;
                    }
                    if (countAbove < 3) return;
                    // 天量: vol is max of last 20 days
                    const v = rawVol[i];
                    if (v === null) return;
                    let maxVol = -Infinity;
                    for (let k = i - 19; k <= i; k++) {
                        if (rawVol[k] !== null && rawVol[k] > maxVol) maxVol = rawVol[k];
                    }
                    if (v < maxVol) return;
                    // 天价: price within 97% of 20-day high
                    const p = shPrices[i];
                    if (p === null) return;
                    let maxPrice = -Infinity;
                    for (let k = i - 19; k <= i; k++) {
                        if (shPrices[k] !== null && shPrices[k] > maxPrice) maxPrice = shPrices[k];
                    }
                    if (p < maxPrice * 0.97) return;
                    qualitySwitches.push({ dataIndex: i, type: 'volumeTop', date: d });
                    volTopCooldown = 5;
                });
                mcChart.qualitySwitches = qualitySwitches;

                if (last5.length > 0) {
                    let tblHtml = '<table class="cycle-tbl"><thead><tr><th>日期</th><th>切换</th><th>情绪分</th><th>信号</th></tr></thead><tbody>';
                    last5.forEach(s => {
                        const arrow = '<span class="arrow">→</span>';
                        const fromTag = '<span class="tag" style="background:' + zoneBgColor(s.from) + ';color:var(--dark);border:1px solid #e2e8f0;">' + s.from + '</span>';
                        const toTag = '<span class="tag" style="background:' + zoneBgColor(s.to) + ';color:var(--dark);border:1px solid #e2e8f0;">' + s.to + '</span>';
                        const sc2 = signalColor(s.signal);
                        const sigTag = '<span class="tag" style="background:' + sc2.tag + ';color:' + sc2.tagText + ';">' + s.signal + '</span>';
                        tblHtml += '<tr class="row-switch"><td class="date-col">' + s.date + '</td><td>' + fromTag + ' ' + arrow + ' ' + toTag + '</td><td>' + s.sentiment.toFixed(0) + '</td><td>' + sigTag + '</td></tr>';
                    });
                    tblHtml += '</tbody></table>';
                    document.getElementById('cycleTableContainer').innerHTML = tblHtml;
                } else {
                    document.getElementById('cycleTableContainer').innerHTML = '<div style="color:var(--gray);font-size:14px;padding:8px 0;">暂无周期切换记录</div>';
                }

                document.querySelectorAll('.sk-overlay').forEach(el => el.remove());
            } catch (e) {
                console.error('初始化失败:', e);
                showToast('加载失败', 'error', function() { location.reload(); });
            }
        }

        init();
    </script>
</body>
</html>
